version: 2

models:
  - name: dim_customer
    description: Customer dimension with one row per customer, including customer attributes from staging and aggregated order history from the orders fact table.
    config:
      tags:
        - mart
        - customers
        - core
    columns:
      - name: customer_id
        description: Primary key for the customer dimension and foreign key back to `stg_customers`.
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: first_name
        description: Customer first name from the staging model.

      - name: last_name
        description: Customer last name from the staging model.

      - name: full_name
        description: Customer full name built from first and last name in staging.

      - name: order_count
        description: Total number of orders placed by the customer. Customers with no orders resolve to 0.
        data_tests:
          - not_null

      - name: first_order_date
        description: Date of the customer's first order. Null when the customer has not placed an order.

      - name: most_recent_order_date
        description: Date of the customer's most recent order. Null when the customer has not placed an order.

      - name: lifetime_value
        description: Total successful payment amount across all of the customer's orders in dollars. Customers with no orders resolve to 0.
        data_tests:
          - not_null

      - name: average_monthly_orders
        description: Average orders per calendar month between the customer's first and most recent order dates, counted inclusively. Resolves to 0 for customers with no orders.
        data_tests:
          - not_null

unit_tests:
  - name: test_dim_customer_aggregates_order_history_and_preserves_customers_without_orders
    description: Aggregates order history to customer grain and keeps customers who have not placed any orders.
    model: dim_customer
    given:
      - input: ref('stg_customers')
        rows:
          - {customer_id: 1, first_name: Ada, last_name: Lovelace, full_name: Ada Lovelace}
          - {customer_id: 2, first_name: Grace, last_name: Hopper, full_name: Grace Hopper}
      - input: ref('fct_orders')
        rows:
          - {order_id: 100, customer_id: 1, order_date: '2024-01-05', order_status: completed, amount: 10}
          - {order_id: 101, customer_id: 1, order_date: '2024-02-10', order_status: returned, amount: 15}
    expect:
      rows:
        - {customer_id: 1, first_name: Ada, last_name: Lovelace, full_name: Ada Lovelace, order_count: 2, first_order_date: '2024-01-05', most_recent_order_date: '2024-02-10', lifetime_value: 25, average_monthly_orders: 1.0}
        - {customer_id: 2, first_name: Grace, last_name: Hopper, full_name: Grace Hopper, order_count: 0, first_order_date: null, most_recent_order_date: null, lifetime_value: 0, average_monthly_orders: 0}
